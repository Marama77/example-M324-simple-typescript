name: Basic Self-Hosted Test

on:
  push:
    branches: [ "main", "master" ]

jobs:
  test-job:
    runs-on: self-hosted
    steps:
      - name: Text ausgeben
        run: echo "Der einfache Workflow läuft direkt über GitHub initiiert auf meinem eigenen Runner!"

      - name: Bei Docker Hub anmelden
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  
